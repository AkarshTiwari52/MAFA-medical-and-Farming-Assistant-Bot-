<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Career Bot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .chat-wrapper {
      width: 420px;
      max-width: 100%;
      height: 700px;
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    /* ── Header ── */
    .chat-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      background: #fff;
      border-bottom: 1px solid #e8eaed;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .bot-avatar {
      width: 40px; height: 40px;
      background: #1a1a2e;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 18px;
    }

    .bot-name { font-weight: 700; font-size: 16px; color: #1a1a2e; }

    .header-icons { display: flex; gap: 8px; align-items: center; }

    /* Language dropdown button */
    .lang-dropdown-wrap { position: relative; }

    .lang-dropdown-btn {
      display: flex;
      align-items: center;
      gap: 2px;
      background: #1a1a2e;
      border: none;
      border-radius: 6px;
      padding: 4px 6px;
      cursor: pointer;
      font-size: 10.5px;
      font-weight: 800;
      color: #fff;
      font-family: inherit;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      transition: opacity 0.15s, transform 0.15s;
    }
    .lang-dropdown-btn:hover { opacity: 0.8; }
    .lang-dropdown-btn:active { transform: scale(0.94); }
    .lang-dropdown-btn .flag { display: none; }
    .lang-dropdown-btn .chevron {
      width: 9px; height: 9px;
      color: rgba(255,255,255,0.55);
      transition: transform 0.2s;
      flex-shrink: 0;
    }
    .lang-dropdown-btn.open .chevron { transform: rotate(180deg); }

    /* Language dropdown list */
    .lang-dropdown-list {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      background: #fff;
      border: 1px solid #ebebeb;
      border-radius: 14px;
      box-shadow: 0 12px 32px rgba(0,0,0,0.14);
      min-width: 155px;
      display: none;
      z-index: 100;
      padding: 5px;
      animation: dropIn 0.15s ease;
    }
    @keyframes dropIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .lang-dropdown-list.open { display: block; }

    .lang-option {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 9px 12px;
      border-radius: 9px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      color: #1a1a2e;
      transition: background 0.12s;
    }
    .lang-option:hover { background: #f5f5f7; }
    .lang-option.selected {
      background: linear-gradient(135deg, #1a1a2e 0%, #2d2d50 100%);
      color: #fff;
    }
    .lang-option .opt-flag { font-size: 17px; line-height: 1; }
    .lang-option .opt-label { flex: 1; }
    .lang-option .check-icon {
      width: 14px; height: 14px;
      opacity: 0;
      flex-shrink: 0;
    }
    .lang-option.selected .check-icon { opacity: 1; }

    /* Icon buttons */
    .icon-btn {
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 34px; height: 34px;
      border-radius: 50%;
      transition: background 0.15s;
    }
    .icon-btn:hover { background: #f0f2f5; }
    .icon-btn svg { width: 22px; height: 22px; color: #444; }
    .icon-btn:hover svg { color: #1a1a2e; }

    /* Refresh spin */
    .icon-btn.spin svg { animation: rotateSpin 0.6s ease; }
    @keyframes rotateSpin { to { transform: rotate(360deg); } }

    /* Speaker off */
    .icon-btn.spk-off { position: relative; }
    .icon-btn.spk-off svg { color: #ccc; }
    .icon-btn.spk-off::after {
      content: '';
      position: absolute;
      width: 2px; height: 26px;
      background: #e00;
      border-radius: 2px;
      transform: rotate(45deg);
      top: 4px; left: 16px;
    }

    /* ── Chat body ── */
    .chat-body {
      flex: 1;
      overflow-y: auto;
      padding: 18px 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scroll-behavior: smooth;
    }
    .chat-body::-webkit-scrollbar { width: 5px; }
    .chat-body::-webkit-scrollbar-thumb { background: #ddd; border-radius: 10px; }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #bbb;
      font-size: 14px;
      gap: 10px;
      user-select: none;
    }
    .empty-state svg { width: 48px; height: 48px; color: #ddd; }

    .timestamp { text-align: center; font-size: 12px; color: #aaa; margin: 4px 0; }

    .bot-bubble {
      align-self: flex-start;
      background: #f0f2f5;
      color: #1a1a2e;
      padding: 12px 16px;
      border-radius: 18px 18px 18px 4px;
      max-width: 75%;
      font-size: 14.5px;
      line-height: 1.5;
    }

    .user-bubble {
      align-self: flex-end;
      background: #1a1a2e;
      color: #fff;
      padding: 10px 16px;
      border-radius: 18px 18px 4px 18px;
      max-width: 65%;
      font-size: 14.5px;
      line-height: 1.5;
    }

    .file-bubble {
      align-self: flex-end;
      background: #1a1a2e;
      color: #fff;
      padding: 10px 14px;
      border-radius: 18px 18px 4px 18px;
      max-width: 72%;
      display: flex; align-items: center; gap: 10px;
    }
    .file-bubble .ficon {
      width: 36px; height: 36px;
      background: rgba(255,255,255,0.15);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
    }
    .file-bubble .ficon svg { width: 20px; height: 20px; color: #fff; }
    .file-bubble .fname { font-weight: 600; font-size: 13px; }
    .file-bubble .ftype { font-size: 11px; opacity: 0.65; }

    .img-bubble {
      align-self: flex-end;
      border-radius: 14px 14px 4px 14px;
      overflow: hidden;
      max-width: 62%;
    }
    .img-bubble img { width: 100%; display: block; object-fit: cover; max-height: 200px; }

    /* Thinking dots */
    .thinking-bubble {
      align-self: flex-start;
      background: #f0f2f5;
      padding: 14px 18px;
      border-radius: 18px 18px 18px 4px;
      display: flex; align-items: center; gap: 6px;
    }
    .thinking-bubble .dot {
      width: 8px; height: 8px;
      background: #1a1a2e;
      border-radius: 50%;
      animation: bounce 1.2s infinite ease-in-out;
    }
    .thinking-bubble .dot:nth-child(2) { animation-delay: 0.2s; }
    .thinking-bubble .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%,60%,100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-7px); opacity: 1; }
    }

    /* ── Footer ── */
    .chat-footer {
      padding: 12px 14px;
      border-top: 1px solid #e8eaed;
      background: #fff;
      display: flex;
      align-items: center;
      gap: 10px;
      position: relative;
    }

    .menu-btn {
      background: none; border: none; cursor: pointer;
      padding: 4px;
      display: flex; flex-direction: column; gap: 4px;
      flex-shrink: 0;
    }
    .menu-btn span {
      display: block; width: 22px; height: 2.5px;
      background: #1a1a2e; border-radius: 2px;
    }

    .chat-input {
      flex: 1; border: none; outline: none;
      font-size: 15px; color: #333;
      background: transparent; padding: 4px 0;
      font-family: inherit;
    }
    .chat-input::placeholder { color: #aaa; }

    .send-btn {
      background: none; border: none; cursor: pointer;
      color: #aaa; padding: 4px;
      transition: color 0.2s;
      display: flex; align-items: center;
    }
    .send-btn:hover { color: #1a1a2e; }
    .send-btn svg { width: 22px; height: 22px; }

    /* Upload popup */
    .upload-menu {
      position: absolute;
      bottom: 62px; left: 10px;
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.13);
      padding: 8px;
      display: none; flex-direction: column; gap: 4px;
      z-index: 20; min-width: 175px;
      border: 1.5px solid #e8eaed;
    }
    .upload-menu.open { display: flex; }
    .upload-menu button {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px;
      border: none; background: none;
      border-radius: 10px; font-size: 14px;
      color: #1a1a2e; cursor: pointer;
      font-family: inherit; font-weight: 500;
      transition: background 0.15s;
    }
    .upload-menu button:hover { background: #f0f2f5; }
    .upload-menu button svg { width: 20px; height: 20px; color: #1a1a2e; flex-shrink: 0; }

    /* Toast */
    .toast {
      position: absolute;
      bottom: 110px; left: 50%;
      transform: translateX(-50%);
      background: #1a1a2e; color: #fff;
      padding: 7px 18px; border-radius: 30px;
      font-size: 12.5px; opacity: 0;
      pointer-events: none; transition: opacity 0.3s;
      white-space: nowrap; z-index: 30;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<div class="chat-wrapper">

  <!-- Header -->
  <div class="chat-header">
    <div class="header-left">
      <div class="bot-avatar">🤖</div>
      <span class="bot-name">MAFA Bot</span>
    </div>
    <div class="header-icons">

      <!-- Language dropdown -->
      <div class="lang-dropdown-wrap" id="langWrap">
        <button class="lang-dropdown-btn" id="langBtn">
          <span class="flag" id="langFlag"></span>
          <span id="langLabel">EN</span>
          <svg class="chevron" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
          </svg>
        </button>

        <div class="lang-dropdown-list" id="langList">
          <div class="lang-option selected" data-lang="en" data-flag="" data-label="EN">
            <span class="opt-flag">🇬🇧</span>
            <span class="opt-label">English</span>
            <svg class="check-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
              <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
            </svg>
          </div>
          <div class="lang-option" data-lang="hi" data-flag="" data-label="HI">
            <span class="opt-flag">🇮🇳</span>
            <span class="opt-label">हिंदी</span>
            <svg class="check-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
              <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
            </svg>
          </div>
        </div>
      </div>

      <!-- Refresh -->
      <button class="icon-btn" id="refreshBtn" title="Clear chat">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582M20 20v-5h-.581M4.582 9A8 8 0 0119.419 15M19.419 15A8 8 0 014.582 9"/>
        </svg>
      </button>

      <!-- Speaker -->
      <button class="icon-btn" id="speakerBtn" title="Toggle voice">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M11 5L6 9H2v6h4l5 4V5zM19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07"/>
        </svg>
      </button>

      <!-- Close -->
      <button class="icon-btn" title="Close">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>

    </div>
  </div>

  <!-- Messages -->
  <div class="chat-body" id="chatBody">
    <div class="empty-state" id="emptyState">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M8 10h.01M12 10h.01M16 10h.01M21 12c0 4.418-4.03 8-9 8a9.77 9.77 0 01-4-.84L3 20l1.09-3.27A7.93 7.93 0 013 12C3 7.582 7.03 4 12 4s9 3.582 9 8z"/>
      </svg>
      <span id="emptyText">No messages yet. Say something!</span>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <input type="file" id="pdfInput" accept=".pdf" style="display:none"/>
  <input type="file" id="photoInput" accept="image/*" style="display:none"/>

  <!-- Footer -->
  <div class="chat-footer">
    <div class="upload-menu" id="uploadMenu">
      <button id="btnPdf">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M7 21h10a2 2 0 002-2V9.414A2 2 0 0018.414 8L13 2.586A2 2 0 0011.586 2H7a2 2 0 00-2 2v15a2 2 0 002 2z"/>
          <path stroke-linecap="round" stroke-linejoin="round" d="M13 2v6h6"/>
        </svg>
        <span id="labelPdf">Upload PDF</span>
      </button>
      <button id="btnPhoto">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4-4a3 3 0 014 0l4 4M14 12l2-2a3 3 0 014 0l2 2M14 8h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
        </svg>
        <span id="labelPhoto">Upload Photo</span>
      </button>
    </div>

    <button class="menu-btn" id="menuBtn" title="Upload">
      <span></span><span></span><span></span>
    </button>

    <input class="chat-input" id="chatInput" type="text" placeholder="Ask anything"/>

    <button class="send-btn" id="sendBtn">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z"/>
      </svg>
    </button>
  </div>
</div>

<script>
  const chatBody   = document.getElementById('chatBody');
  const chatInput  = document.getElementById('chatInput');
  const sendBtn    = document.getElementById('sendBtn');
  const refreshBtn = document.getElementById('refreshBtn');
  const speakerBtn = document.getElementById('speakerBtn');
  const menuBtn    = document.getElementById('menuBtn');
  const uploadMenu = document.getElementById('uploadMenu');
  const pdfInput   = document.getElementById('pdfInput');
  const photoInput = document.getElementById('photoInput');
  const toast      = document.getElementById('toast');
  const langBtn    = document.getElementById('langBtn');
  const langList   = document.getElementById('langList');
  const langFlag   = document.getElementById('langFlag');
  const langLabel  = document.getElementById('langLabel');

  let emptyState = document.getElementById('emptyState');
  let firstMsg   = true;
  let speakerOn  = true;
  let lang       = 'en';

  const content = {
    en: {
      empty: 'No messages yet. Say something!',
      placeholder: 'Ask anything',
      botReply: "Thanks! How can I help you with your career today?",
      botPdf: "Got your PDF! I'll review your details now.",
      botPhoto: "Photo received! I'll use this for your profile.",
      pdfLabel: 'Upload PDF', photoLabel: 'Upload Photo',
      voiceOn: 'Voice ON 🔊', voiceOff: 'Voice OFF 🔇',
      cleared: 'Chat cleared ✓', pdfUp: 'PDF uploaded ✓', photoUp: 'Photo uploaded ✓',
      ttsLang: 'en-US',
    },
    hi: {
      empty: 'अभी कोई संदेश नहीं। कुछ पूछिए!',
      placeholder: 'कुछ भी पूछें',
      botReply: "धन्यवाद! आज मैं आपके करियर में कैसे मदद कर सकता हूँ?",
      botPdf: "आपका PDF मिल गया! मैं अभी आपकी जानकारी देखता हूँ।",
      botPhoto: "फोटो मिल गई! इसे आपकी प्रोफाइल में उपयोग करूँगा।",
      pdfLabel: 'PDF अपलोड करें', photoLabel: 'फोटो अपलोड करें',
      voiceOn: 'आवाज़ चालू 🔊', voiceOff: 'आवाज़ बंद 🔇',
      cleared: 'चैट साफ हो गई ✓', pdfUp: 'PDF अपलोड हुई ✓', photoUp: 'फोटो अपलोड हुई ✓',
      ttsLang: 'hi-IN',
    }
  };

  function t(k) { return content[lang][k]; }

  function applyLang() {
    chatInput.placeholder = t('placeholder');
    document.getElementById('labelPdf').textContent   = t('pdfLabel');
    document.getElementById('labelPhoto').textContent = t('photoLabel');
    const et = document.getElementById('emptyText');
    if (et) et.textContent = t('empty');
  }

  /* ── Language dropdown ── */
  langBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    langBtn.classList.toggle('open');
    langList.classList.toggle('open');
  });

  document.querySelectorAll('.lang-option').forEach(opt => {
    opt.addEventListener('click', () => {
      lang = opt.dataset.lang;
      langFlag.textContent  = opt.dataset.flag;
      langLabel.textContent = opt.dataset.label;
      langBtn.classList.remove('open');
      langList.classList.remove('open');
      document.querySelectorAll('.lang-option').forEach(o => o.classList.remove('selected'));
      opt.classList.add('selected');
      applyLang();
      showToast(lang === 'hi' ? 'भाषा: हिंदी 🇮🇳' : 'Language: English 🇬🇧');
    });
  });

  document.addEventListener('click', () => {
    langBtn.classList.remove('open');
    langList.classList.remove('open');
    uploadMenu.classList.remove('open');
  });

  /* ── Speaker ── */
  speakerBtn.addEventListener('click', () => {
    speakerOn = !speakerOn;
    speakerBtn.classList.toggle('spk-off', !speakerOn);
    if (!speakerOn) window.speechSynthesis.cancel();
    showToast(speakerOn ? t('voiceOn') : t('voiceOff'));
  });

  function speak(text) {
    if (!speakerOn) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = t('ttsLang'); u.rate = 1; u.pitch = 1;
    window.speechSynthesis.speak(u);
  }

  /* ── Helpers ── */
  function scrollBottom() { chatBody.scrollTop = chatBody.scrollHeight; }

  function getTime() {
    const n = new Date();
    let h = n.getHours(), m = n.getMinutes();
    const ap = h >= 12 ? 'pm' : 'am';
    h = h % 12 || 12;
    return `Today ${h}:${String(m).padStart(2,'0')} ${ap}`;
  }

  function clearEmpty() { if (emptyState) { emptyState.remove(); emptyState = null; } }

  function addTimestamp() {
    if (!firstMsg) return;
    firstMsg = false;
    const ts = document.createElement('div');
    ts.className = 'timestamp';
    ts.textContent = getTime();
    chatBody.appendChild(ts);
  }

  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  }

  function showThinking() {
    const b = document.createElement('div');
    b.className = 'thinking-bubble'; b.id = 'thinkingBubble';
    b.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
    chatBody.appendChild(b); scrollBottom();
  }

  function hideThinking() {
    const b = document.getElementById('thinkingBubble');
    if (b) b.remove();
  }

  function addBubble(text, type) {
    clearEmpty(); addTimestamp();
    const d = document.createElement('div');
    d.className = type === 'user' ? 'user-bubble' : 'bot-bubble';
    d.textContent = text;
    chatBody.appendChild(d); scrollBottom();
    if (type === 'bot') speak(text);
  }

  // Send button click
sendBtn.addEventListener('click', sendMessage);

// Enter key support
chatInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    e.preventDefault();
    sendMessage();
  }
});

  /* ── Send ── */
  function sendMessage() {
  const text = chatInput.value.trim();
  if (!text) return;

  addBubble(text, 'user');
  chatInput.value = '';
  showThinking();

  fetch("/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      message: text,
      thread_id: getUserId(),
      language: lang === "hi" ? "Hindi" : "English"
    })
  })
  .then(res => res.json())
  .then(data => {
    hideThinking();
    addBubble(data.reply, 'bot');
  })
  .catch(() => {
    hideThinking();
    addBubble("⚠️ Server error. Please try again.", "bot");
  });
}

  /* ── Refresh ── */
  refreshBtn.addEventListener('click', () => {
    refreshBtn.classList.add('spin');
    refreshBtn.addEventListener('animationend', () => refreshBtn.classList.remove('spin'), { once: true });
    window.speechSynthesis.cancel();
    chatBody.innerHTML = '';
    firstMsg = true;
    const es = document.createElement('div');
    es.className = 'empty-state'; es.id = 'emptyState';
    es.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M8 10h.01M12 10h.01M16 10h.01M21 12c0 4.418-4.03 8-9 8a9.77 9.77 0 01-4-.84L3 20l1.09-3.27A7.93 7.93 0 013 12C3 7.582 7.03 4 12 4s9 3.582 9 8z"/></svg><span id="emptyText">${t('empty')}</span>`;
    chatBody.appendChild(es);
    emptyState = es;
    showToast(t('cleared'));
  });

  /* ── Upload ── */
  menuBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    uploadMenu.classList.toggle('open');
  });
  uploadMenu.addEventListener('click', e => e.stopPropagation());

  document.getElementById('btnPdf').addEventListener('click', () => {
    uploadMenu.classList.remove('open'); pdfInput.click();
  });

  pdfInput.addEventListener('change', () => {
    const file = pdfInput.files[0]; if (!file) return;
    clearEmpty(); addTimestamp();
    const d = document.createElement('div');
    d.className = 'file-bubble';
    d.innerHTML = `<div class="ficon"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M7 21h10a2 2 0 002-2V9.414A2 2 0 0018.414 8L13 2.586A2 2 0 0011.586 2H7a2 2 0 00-2 2v15a2 2 0 002 2z"/></svg></div><div><div class="fname">${file.name}</div><div class="ftype">PDF Document</div></div>`;
    chatBody.appendChild(d); scrollBottom();
    pdfInput.value = '';
    showToast(t('pdfUp'));
    showThinking();
    setTimeout(() => { hideThinking(); addBubble(t('botPdf'), 'bot'); }, 1500);
  });

  document.getElementById('btnPhoto').addEventListener('click', () => {
    uploadMenu.classList.remove('open'); photoInput.click();
  });

  photoInput.addEventListener('change', () => {
    const file = photoInput.files[0]; if (!file) return;
    clearEmpty(); addTimestamp();
    const reader = new FileReader();
    reader.onload = (e) => {
      const d = document.createElement('div');
      d.className = 'img-bubble';
      const img = document.createElement('img');
      img.src = e.target.result; img.alt = file.name;
      d.appendChild(img); chatBody.appendChild(d); scrollBottom();
      showToast(t('photoUp'));
      showThinking();
      setTimeout(() => { hideThinking(); addBubble(t('botPhoto'), 'bot'); }, 1500);
    };
    reader.readAsDataURL(file);
    photoInput.value = '';
  });

  applyLang();


 // ── User ID ──
function getUserId() {
  let userId = localStorage.getItem("mafa_user_id");

  if (!userId) {
    userId = crypto.randomUUID();
    localStorage.setItem("mafa_user_id", userId);
  }

  return userId;
}


</script>
</body>
